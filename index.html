<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VERMIS: Mist & Mirrors</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- ЭКРАН ЗАГРУЗКИ -->
    <div id="loading-overlay" class="loading-overlay">
        <div class="loading-content">
            <p class="loading-title">VERMIS</p>
            <p class="loading-subtitle">Mist & Mirrors</p>
            <div class="loading-bar-track">
                <div class="loading-bar-fill" id="loading-bar-fill"></div>
            </div>
            <p class="loading-status" id="loading-status">Собираю песок Агерута...</p>
        </div>
    </div>

    <div class="game-container">
        <!-- КНОПКА TOGGLE БОКОВОЙ ПАНЕЛИ (только на мобильных) -->
        <button id="sidebar-toggle" class="sidebar-toggle" title="Показать/скрыть информацию">☰</button>
        
        <!-- БОКОВАЯ ПАНЕЛЬ -->
        <aside class="sidebar" id="game-sidebar">
            <div class="panel-box">
                <h3>[ Персонаж ]</h3>
                <div class="stat-row">
                    <span class="stat-label">Имя:</span>
                    <span class="stat-value" id="char-name">???</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Класс:</span>
                    <span class="stat-value" id="char-class">???</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">HP:</span>
                    <span class="stat-value" id="char-hp">?/?</span>
                    <div class="hp-bar"><div class="hp-fill" id="hp-fill" style="width:0%"></div></div>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Сила:</span>
                    <span class="stat-value" id="char-strength">?</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Тел:</span>
                    <span class="stat-value" id="char-constitution">?</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Инт:</span>
                    <span class="stat-value" id="char-intelligence">?</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Муд:</span>
                    <span class="stat-value" id="char-wisdom">?</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Хар:</span>
                    <span class="stat-value" id="char-charisma">?</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Вос:</span>
                    <span class="stat-value" id="char-perception">?</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Удача:</span>
                    <span class="stat-value" id="char-luck">?</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Репутация:</span>
                    <span class="stat-value" id="char-reputation">—</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Проклятия:</span>
                    <span class="stat-value" id="char-curses">—</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Экип:</span>
                    <span class="stat-value" id="char-equip">—</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Призыв:</span>
                    <span class="stat-value" id="char-summoned">—</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Время:</span>
                    <span class="stat-value" id="world-time">—</span>
                </div>
            </div>

            <div class="panel-box">
                <h3>[ Быстрые команды ]</h3>
                <div class="quick-commands">
                    <button class="cmd-btn" data-cmd="инвентарь">Инвентарь</button>
                    <button class="cmd-btn" data-cmd="статус">Статус</button>
                    <button class="cmd-btn" data-cmd="карта">Карта</button>
                    <button class="cmd-btn" data-cmd="помощь">Помощь</button>
                    <button class="cmd-btn" data-cmd="validate_world">Validate</button>
                </div>
            </div>

            <details class="panel-box dev-panel" open>
                <summary>[ Dev Panel / GlobalState ]</summary>
                <pre id="state-json">{}</pre>
            </details>
        </aside>

        <!-- ОСНОВНОЙ ТЕРМИНАЛ -->
        <main class="main-content">
            <div class="output-log" id="terminal-output"></div>
            <div class="autocomplete-hint" id="autocomplete-hint"></div>
            <div class="input-area">
                <span class="prompt">&gt;</span>
                <input type="text" id="terminal-input" placeholder="введи команду..." autocomplete="off" spellcheck="false">
            </div>
        </main>

        <aside class="world-panel" id="world-panel">
            <div class="panel-box world-panel-box">
                <h3>[ Окно окружения ]</h3>
                <div id="environment-window" class="environment-window">
                    Мир загружается...
                </div>
            </div>
        </aside>
    </div>

    <script src="js/ai.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
