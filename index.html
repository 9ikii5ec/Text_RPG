<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VERMIS: Mist & Mirrors</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="game-container">
        <!-- КНОПКА TOGGLE БОКОВОЙ ПАНЕЛИ (только на мобильных) -->
        <button id="sidebar-toggle" class="sidebar-toggle" title="Показать/скрыть информацию">☰</button>
        
        <!-- БОКОВАЯ ПАНЕЛЬ -->
        <aside class="sidebar" id="game-sidebar">
            <div class="panel-box">
                <h3>[ Персонаж ]</h3>
                <div class="stat-row">
                    <span class="stat-label">Имя:</span>
                    <span class="stat-value" id="char-name">???</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Класс:</span>
                    <span class="stat-value" id="char-class">???</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">HP:</span>
                    <span class="stat-value" id="char-hp">?/?</span>
                    <div class="hp-bar"><div class="hp-fill" id="hp-fill" style="width:0%"></div></div>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Сила:</span>
                    <span class="stat-value" id="char-strength">?</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Удача:</span>
                    <span class="stat-value" id="char-luck">?</span>
                </div>
            </div>

            <div class="panel-box">
                <h3>[ Окружение ]</h3>
                <p style="font-size:12px; color:var(--text-sepia); font-style:italic;">
                    Существа рядом:<br>
                    Туман скрывает всё...
                </p>
            </div>

            <div class="panel-box">
                <h3>[ Быстрые команды ]</h3>
                <div class="quick-commands">
                    <button class="cmd-btn" data-cmd="осмотреться">Осмотреться</button>
                    <button class="cmd-btn" data-cmd="инвентарь">Инвентарь</button>
                    <button class="cmd-btn" data-cmd="статус">Статус</button>
                    <button class="cmd-btn" data-cmd="карта">Карта</button>
                    <button class="cmd-btn" data-cmd="помощь">Помощь</button>
                </div>
            </div>

            <div class="panel-box">
                <h3>[ Сохранения ]</h3>
                <p style="font-size:12px; color:var(--text-sepia);">
                    Слот 1 — пусто — <em>Сохр. / Загр.</em><br>
                    Слот 2 — пусто — <em>Сохр. / Загр.</em><br>
                    Слот 3 — пусто — <em>Сохр. / Загр.</em><br>
                    Авто — нет — <em>Загр.</em> ⟳ Новая игра &gt;
                </p>
            </div>
        </aside>

        <!-- ОСНОВНОЙ ТЕРМИНАЛ -->
        <main class="main-content">
            <div class="output-log" id="terminal-output"></div>
            <div class="input-area">
                <span class="prompt">&gt;</span>
                <input type="text" id="terminal-input" placeholder="введи команду..." autocomplete="off" spellcheck="false">
            </div>
        </main>
    </div>

    <script src="js/game.js"></script>
</body>
</html>
