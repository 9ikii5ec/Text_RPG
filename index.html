<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VERMIS: Mist & Mirrors</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="crt-overlay"></div>
    
    <div class="game-container">
        <aside class="sidebar">
            <div class="panel-box character-panel">
                <h3>[ ПЕРСОНАЖ ]</h3>
                <div class="stat-row">
                    <span class="stat-label">Имя:</span>
                    <span id="char-name" class="stat-value">???</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Класс:</span>
                    <span id="char-class" class="stat-value">???</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">HP:</span>
                    <span id="char-hp" class="stat-value">?/?</span>
                    <div class="hp-bar"><div id="hp-fill" class="hp-fill" style="width: 100%"></div></div>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Сила:</span>
                    <span id="char-strength" class="stat-value">?</span>
                </div>
                <div class="stat-row">
                    <span class="stat-label">Удача:</span>
                    <span id="char-luck" class="stat-value">?</span>
                </div>
            </div>
            
            <div class="panel-box environment-panel">
                <h3>[ ОКРУЖЕНИЕ ]</h3>
                <p class="panel-subtitle">Существа рядом:</p>
                <ul id="local-players" class="player-list">
                    <li>Туман скрывает всё...</li>
                </ul>
            </div>
            
            <div class="panel-box commands-panel">
                <h3>[ БЫСТРЫЕ КОМАНДЫ ]</h3>
                <div class="quick-commands">
                    <button class="cmd-btn" data-cmd="осмотреться">Осмотреться</button>
                    <button class="cmd-btn" data-cmd="инвентарь">Инвентарь</button>
                    <button class="cmd-btn" data-cmd="статус">Статус</button>
                    <button class="cmd-btn" data-cmd="карта">Карта</button>
                    <button class="cmd-btn" data-cmd="помощь">Помощь</button>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <div id="terminal-output" class="output-log"></div>
            
            <div class="input-area">
                <span class="prompt">&gt;</span>
                <input type="text" 
                       id="terminal-input" 
                       autofocus 
                       autocomplete="off" 
                       autocorrect="off" 
                       autocapitalize="off" 
                       spellcheck="false"
                       placeholder="Введи имя или команду...">
            </div>
        </main>
    </div>
    
    <script src="../js/game.js"></script>
</body>
</html>
